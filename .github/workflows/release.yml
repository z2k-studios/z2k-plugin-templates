name: Release Obsidian plugin

# Triggers on plain semver tags from scripts/release.mjs (no 'v' prefix). Creates a
# draft release with the three required Obsidian assets so the maintainer can add notes.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f release/main.js || (echo "release/main.js missing" && exit 1)
          test -f manifest.json || (echo "manifest.json missing" && exit 1)
          test -f styles.css || (echo "styles.css missing" && exit 1)

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --draft \
            --prerelease \
            --generate-notes \
            release/main.js manifest.json styles.css
